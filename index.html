<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="description" content="Cap! — Suivez vos objectifs annuels, mensuels et hebdomadaires.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cap!">
  <link rel="manifest" href="./manifest.json">
  <title>Cap! — Mes Objectifs</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg:         #0f1117;
      --bg2:        #161920;
      --bg3:        #1e2230;
      --surface:    #232838;
      --border:     #2e3347;
      --border2:    #3a4060;
      --text:       #e8eaf2;
      --text2:      #9aa0b8;
      --text3:      #5a6080;
      --green:      #3ddc84;
      --green-dim:  #1a5c3a;
      --yellow:     #f5c542;
      --yellow-dim: #5a490d;
      --red:        #ff5f6d;
      --red-dim:    #5a1820;
      --accent:     #5b7fff;
      --accent-dim: #1e2850;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 8px 32px rgba(0,0,0,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ─── Header ─── */
    .app-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(16px + env(safe-area-inset-top, 0px)) 20px 14px;
      background: rgba(15,17,23,.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.75rem; letter-spacing: -1px; }
    .logo-bang { color: var(--green); }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); border-radius: var(--radius-sm);
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .95rem; transition: background .15s, color .15s;
    }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }

    /* ─── Main ─── */
    .main-content { padding: 24px 20px 120px; max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

    /* ─── Period section ─── */
    .period-section { margin-bottom: 36px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-icon { font-size: 1.15rem; }
    .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text2); flex: 1; }
    .btn-add {
      width: 28px; height: 28px; background: var(--accent-dim); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 50%; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background .15s, transform .15s;
    }
    .btn-add:hover { background: var(--accent); color: #fff; transform: scale(1.1); }
    .empty-hint { color: var(--text3); font-size: .88rem; padding: 12px 0; }
    .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: inherit; text-decoration: underline; font-family: inherit; padding: 0; }

    /* ─── Cards ─── */
    .obj-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 10px;
      transition: border-color .2s; animation: cardIn .35s ease both;
    }
    .obj-card:hover { border-color: var(--border2); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .obj-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .obj-info { flex: 1; min-width: 0; }
    .obj-period-badge { display: inline-block; font-size: .7rem; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-bottom: 5px; }
    .obj-period-badge.year   { background: var(--accent-dim); color: var(--accent); }
    .obj-period-badge.month  { background: #2a1f50; color: #a78bfa; }
    .obj-period-badge.week   { background: var(--green-dim); color: var(--green); }
    .obj-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .obj-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon-sm {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
      cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .8rem;
      transition: background .15s, color .15s;
    }
    .btn-icon-sm:hover { background: var(--bg3); color: var(--text); }
    .btn-icon-sm.danger:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

    /* ─── Progress ─── */
    .obj-progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .progress-bar-bg { flex: 1; height: 6px; border-radius: 99px; background: var(--bg3); overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }
    .progress-label { font-size: .8rem; font-weight: 600; min-width: 34px; text-align: right; font-family: 'Syne', sans-serif; }

    /* ─── Tasks ─── */
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: var(--radius-sm); transition: background .15s; }
    .task-item:hover { background: var(--bg3); }
    .task-item.done .task-label { text-decoration: line-through; color: var(--text3); }
    .task-check { width: 18px; height: 18px; accent-color: var(--green); flex-shrink: 0; cursor: pointer; touch-action: manipulation; }
    .task-check-static { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; }
    .task-check-static.checked { background: var(--green); border-color: var(--green); }
    .task-label { font-size: .88rem; color: var(--text2); line-height: 1.3; }
    .empty-tasks { font-size: .82rem; color: var(--text3); padding: 4px 0; }

    /* ─── Clear cache ─── */
    .settings-clearzone { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; }
    .btn-clear-cache {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; color: var(--text3); text-decoration: none;
      padding: 8px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      transition: color .15s, border-color .15s, background .15s;
    }
    .btn-clear-cache:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

    /* ─── FAB ─── */
    .fab-container { position: fixed; bottom: 28px; right: 24px; z-index: 100; display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 10px; }
    .fab {
      width: 56px; height: 56px; border-radius: 50%; background: var(--green); color: #0f1117;
      border: none; font-size: 1.7rem; box-shadow: 0 4px 20px rgba(61,220,132,.35); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: transform .2s, box-shadow .2s;
      font-family: 'Syne', sans-serif; font-weight: 700;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(61,220,132,.45); }
    .fab-menu { display: flex; flex-direction: column; gap: 8px; pointer-events: none; opacity: 0; transform: translateY(10px) scale(.95); transition: opacity .2s, transform .2s; }
    .fab-menu.open { pointer-events: all; opacity: 1; transform: none; }
    .fab-item { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 24px; padding: 8px 16px; font-size: .88rem; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; box-shadow: var(--shadow); transition: background .15s; }
    .fab-item:hover { background: var(--bg3); }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
      opacity: 0; transition: opacity .25s;
    }
    .modal-overlay.visible { opacity: 1; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border); border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 36px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      position: relative; transform: translateY(30px); transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); border-radius: 50%; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .85rem; transition: background .15s;
    }
    .modal-close:hover { background: var(--bg3); color: var(--text); }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 4px; }
    .period-tag { font-size: .9rem; color: var(--accent); font-weight: 600; }
    .modal-subtitle { color: var(--text2); font-size: .92rem; margin-bottom: 20px; }

    /* ─── Fields ─── */
    .field-label { display: block; font-size: .8rem; font-weight: 600; color: var(--text2); letter-spacing: .4px; text-transform: uppercase; margin-bottom: 6px; margin-top: 18px; }
    .field-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-size: .95rem; font-family: 'DM Sans', sans-serif; transition: border-color .2s; outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text3); }
    .mode-toggle { display: flex; gap: 8px; margin-top: 6px; }
    .mode-btn { flex: 1; padding: 9px 12px; background: var(--bg3); border: 1.5px solid var(--border); color: var(--text2); border-radius: var(--radius-sm); font-size: .88rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s, border-color .15s, color .15s; }
    .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .tasks-section { margin-top: 4px; }
    .tasks-section.hidden { display: none; }
    .task-add-row { display: flex; gap: 8px; margin-top: 8px; }
    .task-add-row .field-input { flex: 1; }
    .task-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: var(--radius-sm); background: var(--bg3); margin-bottom: 5px; }
    .task-row-label { flex: 1; font-size: .88rem; color: var(--text2); }
    .btn-remove-task { background: none; border: none; color: var(--text3); cursor: pointer; font-size: .9rem; padding: 2px 4px; border-radius: 4px; transition: color .15s; }
    .btn-remove-task:hover { color: var(--red); }
    .pct-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 99px; background: var(--bg3); outline: none; cursor: pointer; margin-top: 8px; }
    .pct-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(61,220,132,.2); }
    .pct-slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--green); border: none; }

    /* ─── Buttons ─── */
    .btn-primary { width: 100%; margin-top: 22px; background: var(--green); color: #0f1117; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: .95rem; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: opacity .15s, transform .15s; }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-secondary { flex: 1; margin-top: 22px; background: var(--surface); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: .95rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s; }
    .btn-secondary:hover { background: var(--bg3); }
    .btn-secondary.small { flex: unset; margin-top: 0; padding: 8px 14px; font-size: .85rem; }
    .btn-danger { flex: 1; margin-top: 22px; background: var(--red-dim); color: var(--red); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 12px; font-size: .95rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s; }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .review-actions { display: flex; gap: 10px; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Review ─── */
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .review-counter { font-size: .78rem; color: var(--text3); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .review-tag { font-size: .78rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .review-tag.year   { background: var(--accent-dim); color: var(--accent); }
    .review-tag.month  { background: #2a1f50; color: #a78bfa; }
    .review-tag.week   { background: var(--green-dim); color: var(--green); }
    .review-current { display: flex; align-items: baseline; gap: 8px; margin: 12px 0 6px; }
    .review-pct-badge { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
    .review-pct-label { font-size: .85rem; color: var(--text3); }

    /* ─── Archive ─── */
    .archive-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); margin-bottom: 8px; }
    .archive-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .archive-title { font-size: .88rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .archive-pct { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; flex-shrink: 0; }

    /* ─── Settings ─── */
    .settings-section { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px; border-radius: var(--radius-sm);
      background: var(--bg3); border: 1px solid var(--border);
      margin-top: 10px; transition: opacity .2s;
    }
    .settings-row.dimmed { opacity: 0.45; pointer-events: none; }
    .settings-label { display: flex; align-items: center; gap: 12px; flex: 1; }
    .settings-icon { font-size: 1.2rem; flex-shrink: 0; }
    .settings-name { font-size: .92rem; font-weight: 600; color: var(--text); }
    .settings-desc { font-size: .78rem; color: var(--text3); margin-top: 2px; }
    .settings-warn { font-size: .78rem; color: var(--yellow); background: var(--yellow-dim); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 10px; line-height: 1.5; }
    .settings-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 22px; }

    /* Status badge */
    .notif-status { font-size: .8rem; font-weight: 600; padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 10px; text-align: center; }
    .notif-status.on  { background: var(--green-dim); color: var(--green); }
    .notif-status.off { background: var(--bg3); color: var(--text3); }

    /* ─── Toggle switch ─── */
    .toggle-switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 99px;
      background: var(--border2); cursor: pointer; transition: background .25s;
    }
    .toggle-track::before {
      content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%;
      background: #fff; left: 3px; top: 3px; transition: transform .25s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(20px); }
    .toggle-switch input:disabled + .toggle-track { opacity: 0.4; cursor: not-allowed; }

    /* ─── Time input ─── */
    .time-input {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
      border-radius: var(--radius-sm); padding: 6px 10px; font-size: 1rem;
      font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer;
      outline: none; transition: border-color .2s; min-width: 90px;
      color-scheme: dark;
    }
    .time-input:focus { border-color: var(--accent); }
    .time-input:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Toast ─── */
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px); z-index: 300; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 24px; padding: 10px 20px; font-size: .88rem; box-shadow: var(--shadow); opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; white-space: nowrap; }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Shake ─── */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    .shake { animation: shake .35s ease; border-color: var(--red) !important; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; padding: 24px; }
      .modal-box { border: 1px solid var(--border); border-radius: var(--radius); max-height: 85vh; }
    }

    /* ─── Onboarding ─── */
    .onboard-screen {
      position: fixed; inset: 0; z-index: 500;
      background: var(--bg);
      overflow-y: auto;
      opacity: 0; transition: opacity .4s ease;
    }
    .onboard-screen.visible { opacity: 1; }
    .onboard-wrap {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + 40px) 24px calc(env(safe-area-inset-bottom, 0px) + 40px);
      max-width: 520px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 0;
    }
    .onboard-hero { text-align: center; margin-bottom: 32px; }
    .onboard-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.4rem;
      letter-spacing: -1px; margin-bottom: 16px;
    }
    .onboard-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem;
      margin-bottom: 10px;
    }
    .onboard-sub {
      color: var(--text2); font-size: .95rem; line-height: 1.6;
    }
    .onboard-hint {
      font-size: .82rem; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px;
    }
    .suggest-grid {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px;
    }
    .suggest-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      cursor: pointer; text-align: left; transition: border-color .18s, background .18s;
      position: relative;
    }
    .suggest-card:active { transform: scale(.98); }
    .suggest-card.selected {
      border-color: var(--accent); background: var(--accent-dim);
    }
    .suggest-emoji { font-size: 1.4rem; flex-shrink: 0; }
    .suggest-label { font-size: .95rem; color: var(--text); flex: 1; font-weight: 500; }
    .suggest-check {
      font-size: .85rem; font-weight: 700; color: var(--accent);
      background: var(--accent); color: #fff;
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .onboard-actions {
      display: flex; gap: 10px; flex-direction: column;
    }
    .btn-primary.disabled-soft { opacity: 0.5; }

    /* ─── Journal preview sur les cartes ─── */
    .journal-preview {
      display: flex; align-items: flex-start; gap: 10px;
      margin-top: 12px; padding: 10px 12px;
      background: var(--bg3); border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent);
      cursor: pointer;
    }
    .journal-preview:hover { background: var(--surface); }
    .journal-preview-icon { font-size: .9rem; flex-shrink: 0; margin-top: 1px; }
    .journal-preview-body { flex: 1; min-width: 0; }
    .journal-preview-date { font-size: .72rem; color: var(--text3); display: block; margin-bottom: 3px; }
    .journal-preview-text {
      font-size: .84rem; color: var(--text2); line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ─── Journal section dans la review ─── */
    .journal-section { margin-top: 20px; }
    .journal-label { display: flex; align-items: center; gap: 6px; }
    .journal-textarea {
      width: 100%; min-height: 110px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: .92rem;
      font-family: 'DM Sans', sans-serif; line-height: 1.55;
      resize: vertical; outline: none; transition: border-color .2s;
    }
    .journal-textarea:focus { border-color: var(--accent); }
    .journal-textarea::placeholder { color: var(--text3); font-style: italic; }
    .journal-chars { font-size: .72rem; color: var(--text3); text-align: right; margin-top: 4px; }

    /* ─── Journal modal ─── */
    .journal-modal-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 4px; }
    .journal-modal-icon { font-size: 2rem; flex-shrink: 0; margin-top: 2px; }
    .journal-entries { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
    .journal-entry {
      background: var(--bg3); border-radius: var(--radius-sm);
      padding: 14px 16px; border-left: 3px solid var(--border2);
    }
    .journal-entry-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .journal-entry-date { font-size: .75rem; color: var(--text3); text-transform: capitalize; }
    .journal-entry-pct { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem; }
    .journal-entry-text { font-size: .9rem; color: var(--text2); line-height: 1.6; }
    .journal-empty { text-align: center; padding: 32px 16px; }
    .journal-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .journal-empty p { color: var(--text2); font-size: .95rem; }
    .journal-empty-hint { color: var(--text3); font-size: .82rem; margin-top: 6px; }

    /* ─── Journal btn sur les cartes ─── */
    .journal-btn { color: var(--text3) !important; }
    .journal-btn.has-notes { background: var(--accent-dim) !important; border-color: var(--accent) !important; color: var(--accent) !important; }

    /* ─── Badge période Quotidien ─── */
    .obj-period-badge.day { background: #2a1a0a; color: #f5a623; }
    .review-tag.day { background: #2a1a0a; color: #f5a623; }

    /* ─── Historique des bilans ─── */
    .history-day { margin-top: 20px; }
    .history-day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .history-day-date { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .88rem; color: var(--text); text-transform: capitalize; }
    .history-day-count { font-size: .75rem; color: var(--text3); }
    .history-item {
      background: var(--bg3); border-radius: var(--radius-sm);
      padding: 12px 14px; margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .history-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .history-item-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: .92rem; color: var(--text); margin-bottom: 8px; }
    .history-item-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .history-item-progress .progress-bar-bg { flex: 1; }
    .history-status { font-size: .75rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .history-status.green { background: var(--green-dim); color: var(--green); }
    .history-status.yellow { background: var(--yellow-dim); color: var(--yellow); }
    .history-status.red { background: var(--red-dim); color: var(--red); }
    .history-tasks { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .history-task { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--text3); }
    .history-task.done { color: var(--text2); }
    .history-task-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .history-task.done .history-task-dot { background: var(--green); }
    .history-task.done { text-decoration: line-through; }
    .history-note { font-size: .82rem; color: var(--text2); line-height: 1.5; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 6px; }
  </style>
</head>

  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
