<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="description" content="Cap! — Définissez et suivez vos objectifs annuels, mensuels et hebdomadaires.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cap!">
  <link rel="manifest" href="./manifest.json">
  <title>Cap! — Mes Objectifs</title>

  <style>
    /* ─── Fonts ─────────────────────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    /* ─── Variables ─────────────────────────────────────────────────────────── */
    :root {
      --bg:         #0f1117;
      --bg2:        #161920;
      --bg3:        #1e2230;
      --surface:    #232838;
      --border:     #2e3347;
      --border2:    #3a4060;
      --text:       #e8eaf2;
      --text2:      #9aa0b8;
      --text3:      #5a6080;
      --green:      #3ddc84;
      --green-dim:  #1a5c3a;
      --yellow:     #f5c542;
      --yellow-dim: #5a490d;
      --red:        #ff5f6d;
      --red-dim:    #5a1820;
      --accent:     #5b7fff;
      --accent-dim: #1e2850;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 8px 32px rgba(0,0,0,.45);
    }

    /* ─── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ─── Header ─────────────────────────────────────────────────────────────── */
    .app-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 14px;
      background: rgba(15,17,23,.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.75rem;
      letter-spacing: -1px;
      color: var(--text);
    }
    .logo-bang { color: var(--green); }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); border-radius: var(--radius-sm);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .95rem;
      transition: background .15s, color .15s;
    }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }

    /* ─── Main ───────────────────────────────────────────────────────────────── */
    .main-content {
      padding: 24px 20px 120px;
      max-width: 680px; margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ─── Period Section ─────────────────────────────────────────────────────── */
    .period-section { margin-bottom: 36px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .section-icon { font-size: 1.15rem; }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1.05rem;
      color: var(--text2); letter-spacing: .3px;
      flex: 1;
    }
    .btn-add {
      width: 28px; height: 28px;
      background: var(--accent-dim); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 50%;
      font-size: 1.2rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
    }
    .btn-add:hover { background: var(--accent); color: #fff; transform: scale(1.1); }

    .empty-hint {
      color: var(--text3); font-size: .88rem;
      padding: 12px 0;
    }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: inherit; text-decoration: underline;
      font-family: inherit; padding: 0;
    }

    /* ─── Objective Card ─────────────────────────────────────────────────────── */
    .obj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      transition: border-color .2s, transform .15s;
      animation: cardIn .35s ease both;
    }
    .obj-card:hover { border-color: var(--border2); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .obj-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 12px;
    }
    .obj-info { flex: 1; min-width: 0; }
    .obj-period-badge {
      display: inline-block;
      font-size: .7rem; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
      margin-bottom: 5px;
    }
    .obj-period-badge.year   { background: var(--accent-dim); color: var(--accent); }
    .obj-period-badge.month  { background: #2a1f50; color: #a78bfa; }
    .obj-period-badge.week   { background: var(--green-dim); color: var(--green); }

    .obj-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 600;
      color: var(--text); line-height: 1.35;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .obj-actions {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .btn-icon-sm {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem;
      transition: background .15s, color .15s;
    }
    .btn-icon-sm:hover { background: var(--bg3); color: var(--text); }
    .btn-icon-sm.danger:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

    /* ─── Progress Bar ───────────────────────────────────────────────────────── */
    .obj-progress-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .progress-bar-bg {
      flex: 1; height: 6px; border-radius: 99px;
      background: var(--bg3); overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1), background .3s;
    }
    .progress-label {
      font-size: .8rem; font-weight: 600;
      min-width: 34px; text-align: right;
      font-family: 'Syne', sans-serif;
    }

    /* ─── Task List ─────────────────────────────────────────────────────────── */
    .task-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 5px;
      margin-top: 4px;
    }
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: var(--radius-sm);
      transition: background .15s;
    }
    .task-item:hover { background: var(--bg3); }
    .task-item.done .task-label { text-decoration: line-through; color: var(--text3); }

    .task-check {
      width: 16px; height: 16px; accent-color: var(--green);
      flex-shrink: 0; cursor: pointer;
    }
    .task-check-static {
      width: 14px; height: 14px; border-radius: 4px;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
    }
    .task-check-static.checked {
      background: var(--green); border-color: var(--green);
    }
    .task-label { font-size: .88rem; color: var(--text2); line-height: 1.3; }
    .empty-tasks { font-size: .82rem; color: var(--text3); padding: 4px 0; }

    /* ─── FAB ────────────────────────────────────────────────────────────────── */
    .fab-container {
      position: fixed; bottom: 28px; right: 24px; z-index: 100;
      display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 10px;
    }
    .fab {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--green); color: #0f1117;
      border: none; font-size: 1.7rem; line-height: 1;
      box-shadow: 0 4px 20px rgba(61,220,132,.35);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      font-family: 'Syne', sans-serif; font-weight: 700;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(61,220,132,.45); }
    .fab-menu {
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; opacity: 0;
      transform: translateY(10px) scale(.95);
      transition: opacity .2s, transform .2s;
    }
    .fab-menu.open { pointer-events: all; opacity: 1; transform: none; }
    .fab-item {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 24px;
      padding: 8px 16px; font-size: .88rem;
      cursor: pointer; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      box-shadow: var(--shadow);
      transition: background .15s;
    }
    .fab-item:hover { background: var(--bg3); }

    /* ─── Modal ─────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
      opacity: 0; transition: opacity .25s;
    }
    .modal-overlay.visible { opacity: 1; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 36px;
      width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      transform: translateY(30px);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .85rem;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--bg3); color: var(--text); }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.4rem;
      color: var(--text); margin-bottom: 4px;
    }
    .period-tag {
      font-size: .9rem; color: var(--accent); font-weight: 600;
    }
    .modal-subtitle {
      color: var(--text2); font-size: .92rem;
      margin-bottom: 20px;
    }

    /* ─── Fields ────────────────────────────────────────────────────────────── */
    .field-label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--text2); letter-spacing: .4px; text-transform: uppercase;
      margin-bottom: 6px; margin-top: 18px;
    }
    .field-input {
      width: 100%;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: .95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s;
      outline: none;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text3); }

    /* ─── Mode toggle ────────────────────────────────────────────────────────── */
    .mode-toggle {
      display: flex; gap: 8px; margin-top: 6px;
    }
    .mode-btn {
      flex: 1; padding: 9px 12px;
      background: var(--bg3); border: 1.5px solid var(--border);
      color: var(--text2); border-radius: var(--radius-sm);
      font-size: .88rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background .15s, border-color .15s, color .15s;
    }
    .mode-btn.active {
      background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
    }

    /* ─── Tasks section ──────────────────────────────────────────────────────── */
    .tasks-section { margin-top: 4px; }
    .tasks-section.hidden { display: none; }
    .task-add-row { display: flex; gap: 8px; margin-top: 8px; }
    .task-add-row .field-input { flex: 1; }

    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: var(--radius-sm);
      background: var(--bg3); margin-bottom: 5px;
    }
    .task-row-label { flex: 1; font-size: .88rem; color: var(--text2); }
    .btn-remove-task {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: .9rem;
      padding: 2px 4px; border-radius: 4px;
      transition: color .15s;
    }
    .btn-remove-task:hover { color: var(--red); }

    /* ─── Slider ─────────────────────────────────────────────────────────────── */
    .pct-slider {
      -webkit-appearance: none; width: 100%; height: 6px;
      border-radius: 99px; background: var(--bg3);
      outline: none; cursor: pointer; margin-top: 8px;
    }
    .pct-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 50%; background: var(--green);
      box-shadow: 0 0 0 3px rgba(61,220,132,.2);
    }
    .pct-slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--green); border: none;
    }

    /* ─── Buttons ────────────────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; margin-top: 22px;
      background: var(--green); color: #0f1117;
      border: none; border-radius: var(--radius-sm);
      padding: 13px; font-size: .95rem; font-weight: 700;
      font-family: 'Syne', sans-serif; cursor: pointer;
      transition: opacity .15s, transform .15s;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }

    .btn-secondary {
      flex: 1; margin-top: 22px;
      background: var(--surface); color: var(--text2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px; font-size: .95rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: var(--bg3); }

    .btn-danger {
      flex: 1; margin-top: 22px;
      background: var(--red-dim); color: var(--red);
      border: 1px solid var(--red); border-radius: var(--radius-sm);
      padding: 12px; font-size: .95rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: background .15s;
    }
    .btn-danger:hover { background: var(--red); color: #fff; }

    .review-actions { display: flex; gap: 10px; }

    /* ─── Review modal ────────────────────────────────────────────────────────── */
    .review-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .review-counter {
      font-size: .78rem; color: var(--text3); font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .review-tag {
      font-size: .78rem; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .3px;
    }
    .review-tag.year   { background: var(--accent-dim); color: var(--accent); }
    .review-tag.month  { background: #2a1f50; color: #a78bfa; }
    .review-tag.week   { background: var(--green-dim); color: var(--green); }

    .review-title { margin-bottom: 6px; }
    .review-current {
      display: flex; align-items: baseline; gap: 8px;
      margin: 12px 0 6px;
    }
    .review-pct-badge {
      font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    }
    .review-pct-label { font-size: .85rem; color: var(--text3); }

    /* ─── Archive ────────────────────────────────────────────────────────────── */
    .archive-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg3);
      margin-bottom: 8px;
    }
    .archive-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .archive-title { font-size: .88rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .archive-pct { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; flex-shrink: 0; }

    /* ─── Toast ─────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
      z-index: 300;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 24px;
      padding: 10px 20px; font-size: .88rem;
      box-shadow: var(--shadow);
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Shake ─────────────────────────────────────────────────────────────── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake .35s ease; border-color: var(--red) !important; }

    /* ─── Scrollbar ──────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ─── Desktop ────────────────────────────────────────────────────────────── */
    @media (min-width: 600px) {
      .modal-overlay { align-items: center; padding: 24px; }
      .modal-box {
        border: 1px solid var(--border); border-radius: var(--radius);
        max-height: 85vh;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
